<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign up for the Prospect Park Soccer newsletter — games, leagues, and everything PPS.">
  <title>Newsletter — Prospect Park Soccer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Young+Serif&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="site.css">
</head>
<body>

  <nav class="nav">
    <a href="index.html">
      <img src="pps_turtle_300x300.png" alt="Prospect Park Soccer" class="nav-logo">
    </a>
    <button class="nav-hamburger" id="hamburger" aria-label="Open menu">☰</button>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="how-we-play.html">How We Play</a></li>
      <li><a href="turtle-league.html">Turtle League</a></li>
      <li><a href="newsletter-signup.html" class="active">Newsletter</a></li>
    </ul>
  </nav>

  <main>

    <section class="newsletter-section">
      <div class="newsletter-wrap">
        <h1>Stay in the loop.</h1>
        <p>Games, leagues, and everything PPS — straight to your inbox.</p>
        <script async src="https://subscribe-forms.beehiiv.com/v3/loader.js" data-beehiiv-form="65462af9-aee8-45dc-8c5d-dd3229d39357"></script>
      </div>
    </section>

  </main>

  <footer class="footer">
    <span class="footer-name">Prospect Park Soccer</span>
    <span class="footer-loc">Brooklyn, NY</span>
  </footer>

  <script>
    const hamburger = document.getElementById('hamburger');
    const navLinks  = document.getElementById('nav-links');
    hamburger.addEventListener('click', () => {
      const isOpen = navLinks.classList.toggle('open');
      hamburger.textContent = isOpen ? '✕' : '☰';
    });
    navLinks.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => {
        navLinks.classList.remove('open');
        hamburger.textContent = '☰';
      });
    });
  </script>

</body>
</html>
